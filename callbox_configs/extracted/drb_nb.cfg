/* DRB configuration for each QCI value for NB-IoT. If no
/* corresponding QCI is
   found, QCI = 9 is used instead.
   QCI characteristics in TS 23.203 table 6.1.7 */
[
  {
    qci: 9, /* AM - best effort (Internet traffic) */
    pdcp_config: {
      discardTimer: 0, /* in ms, 0 means infinity */
      /* ROHC header compression */
      headerCompression: null,
    },
    rlc_config: {
      /* UE side */
      ul_am: {
        t_PollRetransmit: 6000, /* in ms */
        maxRetxThreshold: 32,
      },
      dl_am: {
        enableStatusReportSN_Gap: false,
        //t_Reordering: 60, /* in ms, used only for UEs configured with twoHARQ (default 60 ms) */
      },
      /* eNB side */
      enb_dl_am: {
        t_PollRetransmit: 6000, /* in ms */
        maxRetxThreshold: 32,
      },
      enb_ul_am: {
        //t_Reordering: 60, /* in ms, used only for UEs configured with twoHARQ (default 60 ms) */
      },
      /* common to both sides */
      /* used if UE declares support of RLC UM
         both: um-Bi-Directional-r15
         ul: um-Uni-Directional-UL-r15
         dl: um-Uni-Directional-DL-r15 */
      //um_r15: "both",
    },
    logical_channel_config: {
      priority: 13,
      logical_channel_sr_prohibit: true,
    },
    /* default 5QI QOS characteristics to be used by the ng-eNB */
    "5qi_qos": {
      priority_level: 90
    },
    /* activate periodic UL grant feature if set to true and if
       periodic_ul_grant configuration object is defined in the cell */
    use_periodic_ul_grant: false,
    /* defines the maximum number of bytes that can be queued in the DL PDCP entity
      before dropping incoming DL packets; default value is 1048576 */
    //tx_fifo_size: 1048576
  },
  {
    qci: 10, /* AM - best effort (Internet traffic) over satellite access */
    pdcp_config: {
      discardTimer: 0, /* in ms, 0 means infinity */
      /* ROHC header compression */
      headerCompression: null,
    },
    rlc_config: {
      /* UE side */
      ul_am: {
        t_PollRetransmit: 6000, /* in ms */
        maxRetxThreshold: 32,
      },
      dl_am: {
        enableStatusReportSN_Gap: false,
      },
      /* eNB side */
      enb_dl_am: {
        t_PollRetransmit: 6000, /* in ms */
        maxRetxThreshold: 32,
      },
      enb_ul_am: {
      },
    },
    logical_channel_config: {
      priority: 13,
      logical_channel_sr_prohibit: true,
    },
    /* default 5QI QOS characteristics to be used by the ng-eNB */
    "5qi_qos": {
      priority_level: 90
    },
    /* activate periodic UL grant feature if set to true and if
       periodic_ul_grant configuration object is defined in the cell */
    use_periodic_ul_grant: false,
    /* defines the maximum number of bytes that can be queued in the DL PDCP entity
      before dropping incoming DL packets; default value is 1048576 */
    //tx_fifo_size: 1048576
  }
]
