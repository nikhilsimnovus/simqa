        tac: 1 
      },
    ],
  }
], /* cell_list */
#endif

  /* default NB-IoT cell parameters */
  nb_cell_default: {
    /* SI info */
    si_value_tag: 0, /* increment modulo 32 if SI is modified */
    r_sib1: 4, /* number of SIB1 repetitions */
