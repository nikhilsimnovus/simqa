        nprach_detect_threshold: 40, /* in dB */
        npdcch_ra_n_rep: 1, /* must be <= npdcch-NumRepetitions-RA-r13 */
        npdsch_ra_n_rep: 1, /* number of repetition for NPDSCH with RAR */
        npdsch_ra_i_tbs: 3, /* I_TBS for NPDSCH with RAR */

        /* msg3 configuration */
