  /* default cell parameters */
  cell_default: {

    /* Broadcasted PLMN identities */
    plmn_list: [
      "00101", 
    ],

    n_antenna_dl: N_ANTENNA_DL, /* number of DL antennas */
    n_antenna_ul: N_ANTENNA_UL, /* number of UL antennas */
