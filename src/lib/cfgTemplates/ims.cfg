#define USE_N5 0 /* set to 1 to use N5 interface instead of Rx interface */

{
    //log_options: "all.level=debug,all.max_size=1500",
    log_options: "all.level=error,sip.level=debug,sip.max_size=1,ims.level=debug,rx.level=debug,rx.max_size=1,n5.level=debug,n5.max_size=1,cx.level=debug,cx.max_size=1",
    log_filename: "/tmp/ims.log",

    /* SIP bind address */
    sip_addr: [
        {addr: "192.168.4.1", bind_addr: "192.168.4.1", port_min: 10000, port_max: 20000},
        "2001:468:3000:1::",
        {addr: "192.168.5.1", bind_addr: "192.168.5.1", port_min: 10000, port_max: 20000},
        "2001:468:4000:1::"
    ],

    mms_server_bind_addr: "192.168.3.1:1111",

    /* MME connection for SMS over SG */
    sctp_addr: "127.0.0.1",

    /* Cx connection */
    cx_server_addr: "127.0.1.100",
    cx_bind_addr: "127.0.0.1",

#if USE_N5 == 0
    /* Rx connection */
    rx_server_addr: "127.0.1.100",
#else
    /* N5 connection */
    use_n5: true,
#endif

    /* Remote API */
    com_addr: "[::]:9003",

    /* Global domain name (May be overriden for each user) */
    domain: "simnovus.com",

    /* user data base */
    include "ue_db-ims.cfg",

    /* Echo phone number */
    echo: [
        "tel:666",
        "tel:+666",
        {impu: "tel:404", code: 404},     /* 404 test */
        {impu: "urn:service:sos", anonymous: true, authentication: false}, /* Emergency call */
        {impu: "urn:service:sos.police", anonymous: true, authentication: false}, /* Emergency call */
        {impu: "urn:service:sos.ecall.automatic", anonymous: true, authentication: false}, /* NG-eCall */
        {impu: "urn:service:sos.ecall.manual", anonymous: true, authentication: false}, /* NG-eCall */
        {impu: "urn:service:test.sos.ecall", anonymous: true, authentication: false}, /* NG-eCall */
    ],

    /* Delay */
    //sms_expires: 86400,
    //binding_expires: 3600,

    /* on: 3GPP mode allowed
     * silent: 3GPP mode forced
     * off: IETF mode
     */
    precondition: "on",
    "100rel": true,

    /* IPsec */
    ipsec_aalg_list: ["null", "hmac-md5-96", "hmac-sha-1-96", "hmac-md5-128", "hmac-sha-1-160", "aes-cmac-96", "aes-gmac", "aes-gmac-us"],
    ipsec_ealg_list: ["null", "aes-cbc", "des-cbc", "des-ede3-cbc", "blowfish", "aes-ctr", "aes-gcm", "aes-gcm-us"],

    mt_call_sdp_file: "mt_call_qos.sdp",

    ue_db_filename: "lte_ue_ims.db",
}
